<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elioris Intro Builder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=EB+Garamond:wght@400;500;600&family=Manrope:wght@500;600;700&display=swap');

  :root {
    --bg: #0d1117;
    --bg-soft: #141923;
    --panel: rgba(16, 20, 28, 0.76);
    --line: rgba(255, 255, 255, 0.08);
    --line-strong: rgba(255, 255, 255, 0.14);
    --text: #f2eee6;
    --muted: #a4adbb;
    --accent: #d9bc82;
    --shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
    --radius: 18px;
    --phone-width: 405px;
    --phone-height: 720px;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Manrope', sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at top left, rgba(120, 152, 210, 0.10), transparent 28%),
      linear-gradient(180deg, #0d1117 0%, #111720 100%);
  }

  .page {
    padding: 16px;
  }

  .layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: 16px;
    align-items: start;
  }

  .panel,
  .preview,
  .gallery {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    backdrop-filter: blur(10px);
  }

  .panel {
    position: sticky;
    top: 16px;
    padding: 14px;
  }

  .preview {
    padding: 14px;
  }

  h1,
  h2,
  h3,
  h4,
  p {
    margin: 0;
  }

  .settings {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
  }

  .setting {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    padding: 10px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.015);
  }

  .setting strong {
    display: block;
    font-size: 12px;
    font-weight: 600;
  }

  .setting span {
    display: block;
    margin-top: 2px;
    color: var(--muted);
    font-size: 11px;
  }

  .toggle {
    width: 48px;
    height: 26px;
    border: 0;
    border-radius: 999px;
    position: relative;
    background: rgba(255, 255, 255, 0.12);
    cursor: pointer;
    transition: background 0.22s ease;
  }

  .toggle::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 3px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #f4efe3;
    transition: transform 0.22s ease;
  }

  .toggle[aria-checked="true"] {
    background: rgba(217, 188, 130, 0.92);
  }

  .toggle[aria-checked="true"]::after {
    transform: translateX(22px);
  }

  .button {
    appearance: none;
    border: 1px solid var(--line-strong);
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.04);
    color: var(--text);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 8px 10px;
    cursor: pointer;
    transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
  }

  .button:hover {
    border-color: rgba(217, 188, 130, 0.6);
    background: rgba(255, 255, 255, 0.07);
    transform: translateY(-1px);
  }

  .slides-config {
    display: grid;
    gap: 10px;
    margin-top: 10px;
  }

  .section-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .slide-card {
    padding: 10px;
    border: 1px solid var(--line);
    border-radius: 15px;
    background: transparent;
  }

  .slide-header {
    display: grid;
    grid-template-columns: 54px minmax(0, 1fr);
    gap: 10px;
    align-items: start;
  }

  .slide-main-thumb {
    width: 100%;
    aspect-ratio: 9 / 16;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.04);
  }

  .slide-main-thumb img,
  .variant-thumb img,
  .gallery-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .slide-card h3 {
    font-size: 14px;
  }

  .slide-card p {
    margin-top: 4px;
    color: var(--muted);
    font-size: 11px;
    line-height: 1.25;
  }

  .slide-copy {
    margin-top: 8px;
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-size: 11px;
    line-height: 1.4;
  }

  .variants-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(34px, 1fr));
    gap: 6px;
    margin-top: 10px;
  }

  .variant-thumb {
    appearance: none;
    padding: 0;
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.03);
    cursor: pointer;
    aspect-ratio: 9 / 16;
    width: 100%;
    transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
  }

  .variant-thumb:hover {
    transform: translateY(-1px) scale(1.05);
    border-color: rgba(217, 188, 130, 0.75);
    box-shadow: 0 14px 24px rgba(0, 0, 0, 0.28);
    z-index: 2;
  }

  .variant-thumb.is-selected {
    border-color: rgba(217, 188, 130, 0.85);
    box-shadow: 0 0 0 1px rgba(217, 188, 130, 0.35);
  }

  .preview-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .preview-tools {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .status {
    text-align: right;
  }

  .status strong {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: 13px;
  }

  .status span {
    display: block;
    margin-top: 4px;
    color: var(--muted);
    font-size: 11px;
  }

  .restart-button {
    padding: 10px 16px;
    font-size: 12px;
    letter-spacing: 0.08em;
  }

  .preview-stage {
    display: grid;
    place-items: center;
    min-height: 654px;
    padding: 0 0 8px;
  }

  .phone {
    position: relative;
    width: var(--phone-width);
    height: var(--phone-height);
    padding: 5px;
    border-radius: 24px;
    background: linear-gradient(180deg, rgba(34, 40, 52, 0.75) 0%, rgba(8, 11, 17, 0.85) 100%);
    box-shadow: 0 18px 36px rgba(0, 0, 0, 0.28);
  }

  .screen {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    border-radius: 20px;
    background: #040608;
  }

  .slides {
    position: absolute;
    inset: 0;
  }

  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 900ms ease;
  }

  .slide.is-active {
    opacity: 1;
  }

  .image-wrap {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  .slide-backdrop,
  .slide-artwork {
    position: absolute;
    display: block;
  }

  .slide-backdrop {
    inset: -8%;
    width: calc(100% + 16%);
    height: calc(100% + 16%);
    object-fit: cover;
    filter: blur(18px) brightness(0.42) saturate(0.9);
    transform: scale(1.02);
  }

  .slide-artwork {
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center center;
    filter: drop-shadow(0 24px 36px rgba(0, 0, 0, 0.28));
    transform: scale(1);
    transition: transform 10s ease;
  }

  .slide.is-active .slide-artwork {
    transform: scale(1.035);
  }

  .slide::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(4, 8, 12, 0.06) 0%, rgba(4, 8, 12, 0.15) 46%, rgba(4, 8, 12, 0.92) 100%);
    pointer-events: none;
    z-index: 2;
  }

  .caption {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 4;
    padding: 170px 24px 28px;
    background: linear-gradient(180deg, transparent 0%, rgba(4, 8, 12, 0.16) 30%, rgba(4, 8, 12, 0.78) 72%, rgba(4, 8, 12, 0.98) 100%);
    text-align: center;
  }

  .caption-line {
    display: block;
    opacity: 0;
    transform: translateY(18px);
    font-family: 'EB Garamond', serif;
    font-size: 24px;
    line-height: 1.34;
    text-shadow: 0 2px 16px rgba(0, 0, 0, 0.58);
  }

  .caption-line + .caption-line {
    margin-top: 0.18em;
  }

  .caption-line.is-final {
    margin-top: 6px;
    font-family: 'Cinzel', serif;
    font-size: 18px;
    color: #f7ead0;
  }

  .screen.animate-text .slide.is-active .caption-line {
    opacity: 1;
    transform: translateY(0);
    transition:
      opacity 720ms ease calc(var(--line-index) * 260ms + 260ms),
      transform 720ms ease calc(var(--line-index) * 260ms + 260ms);
  }

  .screen:not(.animate-text) .slide.is-active .caption-line {
    opacity: 1;
    transform: translateY(0);
    transition: none;
  }

  .screen-glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, transparent 60%, rgba(0, 0, 0, 0.42) 100%);
    pointer-events: none;
    z-index: 5;
  }

  .nav {
    position: absolute;
    top: 50%;
    width: 72px;
    height: 96px;
    border: 0;
    background: none;
    color: rgba(245, 236, 219, 0.96);
    transform: translateY(-50%);
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 6;
  }

  .screen.manual-nav .nav {
    opacity: 1;
    pointer-events: auto;
  }

  .nav:hover {
    transform: translateY(-50%) scale(1.05);
  }

  .nav.left { left: 2px; }
  .nav.right { right: 2px; }

  .nav svg {
    width: 100%;
    height: 100%;
    display: block;
    filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.44));
  }

  .preview-foot {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .chip {
    padding: 5px 8px;
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--muted);
    font-size: 11px;
    font-family: 'Manrope', sans-serif;
  }

  .hover-preview {
    position: fixed;
    top: 0;
    left: 0;
    width: 210px;
    padding: 8px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 14px;
    background: rgba(10, 14, 20, 0.94);
    box-shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
    backdrop-filter: blur(10px);
    opacity: 0;
    pointer-events: none;
    transform: translate3d(16px, 16px, 0);
    transition: opacity 0.12s ease;
    z-index: 30;
  }

  .hover-preview.is-visible {
    opacity: 1;
  }

  .hover-preview img {
    width: 100%;
    aspect-ratio: 9 / 16;
    object-fit: cover;
    display: block;
    border-radius: 10px;
  }

  .hover-preview strong {
    display: block;
    margin-top: 8px;
    font-size: 13px;
    color: var(--text);
    font-family: 'Manrope', sans-serif;
  }

  @media (max-width: 1120px) {
    .layout {
      grid-template-columns: 1fr;
    }

    .panel {
      position: static;
    }

    .settings {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
  }

  @media (max-width: 720px) {
    .page {
      padding: 14px;
    }

    .phone {
      width: min(100%, var(--phone-width));
      height: auto;
      aspect-ratio: 9 / 16;
    }

    .caption {
      padding: 160px 24px 30px;
    }

    .caption-line {
      font-size: 25px;
    }

    .settings {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
<div class="page">
  <main class="layout">
    <aside class="panel">
      <section class="settings">
        <div class="setting">
          <div>
            <strong>Mute</strong>
          </div>
          <button class="toggle" id="muteToggle" type="button" aria-checked="false" aria-label="Mute"></button>
        </div>

        <div class="setting">
          <div>
            <strong>Autoplay</strong>
          </div>
          <button class="toggle" id="autoplayToggle" type="button" aria-checked="true" aria-label="Autoplay"></button>
        </div>

        <div class="setting">
          <div>
            <strong>Text Animation</strong>
          </div>
          <button class="toggle" id="textAnimationToggle" type="button" aria-checked="true" aria-label="Text animation"></button>
        </div>

      </section>

      <section class="slides-config">
        <div id="slideCards"></div>
      </section>
    </aside>

    <section class="preview">
      <div class="preview-head">
        <div class="preview-tools">
          <button class="button restart-button" id="restartBtn" type="button">Restart Preview</button>
        </div>
        <div class="status">
          <strong id="slideStatus">1 / 5</strong>
          <span id="modeStatus">auto</span>
        </div>
      </div>

      <div class="preview-stage">
        <div class="phone">
          <div class="screen animate-text" id="screen">
            <div class="slides" id="slides"></div>

            <button class="nav left" id="prevBtn" type="button" aria-label="Previous slide">
              <svg viewBox="0 0 64 84" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M40 14L22 42L40 70" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M46 10L26 42L46 74" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
              </svg>
            </button>

            <button class="nav right" id="nextBtn" type="button" aria-label="Next slide">
              <svg viewBox="0 0 64 84" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M24 14L42 42L24 70" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M18 10L38 42L18 74" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
              </svg>
            </button>

            <div class="screen-glow"></div>
          </div>
        </div>
      </div>

      <div class="preview-foot">
        <span class="chip" id="textStatus">text on</span>
        <span class="chip" id="audioStatus">audio on</span>
      </div>
    </section>
  </main>
</div>

<audio id="bgMusic" preload="auto" src="content/sound.mp3"></audio>
<div class="hover-preview" id="hoverPreview" aria-hidden="true">
  <img id="hoverPreviewImage" src="" alt="">
  <strong id="hoverPreviewTitle"></strong>
</div>

<script>
(function () {
  'use strict';

  const slideData = [
    {
      id: 1,
      title: 'Slide 1',
      description: 'The War of the Titans',
      lines: [
        'Long ago, the War of the Titans was fought across Elioris.',
        'Ancient powers battled for the fate of the world.'
      ],
      variants: [
        { label: 'Default', path: 'content/1.jpeg' },
        { label: 'Option 1', path: 'content/1/1 (1).jpeg' },
        { label: 'Option 2', path: 'content/1/1 (2).jpeg' },
        { label: 'Option 3', path: 'content/1/1 (3).jpeg' },
        { label: 'Option 4', path: 'content/1/1 (4).jpeg' },
        { label: 'Option 5', path: 'content/1/1 (5).jpeg' },
        { label: 'Option 6', path: 'content/1/1 (6).jpeg' },
        { label: 'Option 7', path: 'content/1/1 (7).jpeg' },
        { label: 'Option 8', path: 'content/1/1 (8).jpeg' }
      ]
    },
    {
      id: 2,
      title: 'Slide 2',
      description: 'Darkness cast down',
      lines: [
        'Darkness was defeated, and the Titans fell into sleep.',
        'After that, a new age began for mortals.'
      ],
      variants: [
        { label: 'Default', path: 'content/2.jpeg' },
        { label: 'Option 1', path: 'content/2/2 (1).jpeg' },
        { label: 'Option 2', path: 'content/2/2 (2).jpeg' },
        { label: 'Option 3', path: 'content/2/2 (3).jpeg' },
        { label: 'Option 4', path: 'content/2/2 (4).jpeg' },
        { label: 'Option 5', path: 'content/2/2 (5).jpeg' },
        { label: 'Option 6', path: 'content/2/2 (6).jpeg' }
      ]
    },
    {
      id: 3,
      title: 'Slide 3',
      description: 'Elioris flourishes',
      lines: [
        'Ages passed, and Elioris flourished.',
        'Humans and the Exalted built cities, guarded knowledge, and lived in peace.'
      ],
      variants: [
        { label: 'Default', path: 'content/3.jpeg' },
        { label: 'Option 1', path: 'content/3/3 (1).jpeg' },
        { label: 'Option 2', path: 'content/3/3 (2).jpeg' },
        { label: 'Option 3', path: 'content/3/3 (3).jpeg' },
        { label: 'Option 4', path: 'content/3/3 (4).jpeg' },
        { label: 'Option 5', path: 'content/3/3 (5).jpeg' }
      ]
    },
    {
      id: 4,
      title: 'Slide 4',
      description: 'The fallen Titan returns',
      lines: [
        'But peace did not last forever.',
        'The cult of the Unified revived a fallen Titan, and from that day, danger returned to Elioris.'
      ],
      variants: [
        { label: 'Default', path: 'content/4.jpeg' },
        { label: 'Option 1', path: 'content/4/4 (1).jpeg' },
        { label: 'Option 2', path: 'content/4/4 (2).jpeg' },
        { label: 'Option 3', path: 'content/4/4 (3).jpeg' },
        { label: 'Option 4', path: 'content/4/4 (4).jpeg' }
      ]
    },
    {
      id: 5,
      title: 'Slide 5',
      description: 'The call to the hero',
      lines: [
        'And yet hope remains.',
        'Your journey begins now.',
        'Stand for the light and save this world.'
      ],
      variants: [
        { label: 'Default', path: 'content/5.jpeg' },
        { label: 'Option 1', path: 'content/5/5 (1).jpeg' },
        { label: 'Option 2', path: 'content/5/5 (2).jpeg' },
        { label: 'Option 3', path: 'content/5/5 (3).jpeg' }
      ]
    }
  ];

  const state = {
    currentSlide: 0,
    selectedVariant: slideData.map(() => 0),
    autoplay: true,
    animateText: true,
    muted: false
  };

  const slideCards = document.getElementById('slideCards');
  const slidesRoot = document.getElementById('slides');
  const screen = document.getElementById('screen');
  const bgMusic = document.getElementById('bgMusic');
  const hoverPreview = document.getElementById('hoverPreview');
  const hoverPreviewImage = document.getElementById('hoverPreviewImage');
  const hoverPreviewTitle = document.getElementById('hoverPreviewTitle');

  const slideStatus = document.getElementById('slideStatus');
  const modeStatus = document.getElementById('modeStatus');
  const textStatus = document.getElementById('textStatus');
  const audioStatus = document.getElementById('audioStatus');

  const muteToggle = document.getElementById('muteToggle');
  const autoplayToggle = document.getElementById('autoplayToggle');
  const textAnimationToggle = document.getElementById('textAnimationToggle');

  let autoplayTimer = null;

  function currentVariant(slideIndex) {
    return slideData[slideIndex].variants[state.selectedVariant[slideIndex]];
  }

  function renderCaption(lines) {
    return lines.map((line, index) => {
      const finalClass = index === lines.length - 1 && lines.length > 2 ? ' is-final' : '';
      return '<span class="caption-line' + finalClass + '" style="--line-index:' + index + '">' + line + '</span>';
    }).join('');
  }

  function buildPreviewSlides() {
    slidesRoot.innerHTML = slideData.map((slide, index) => `
      <article class="slide${index === state.currentSlide ? ' is-active' : ''}" data-slide-index="${index}">
        <div class="image-wrap">
          <img class="slide-backdrop" src="${currentVariant(index).path}" alt="" aria-hidden="true">
          <img class="slide-artwork" src="${currentVariant(index).path}" alt="${slide.description}">
        </div>
        <div class="caption">
          ${renderCaption(slide.lines)}
        </div>
      </article>
    `).join('');
  }

  function thumbButton(slideIndex, variantIndex) {
    const variant = slideData[slideIndex].variants[variantIndex];
    const selected = state.selectedVariant[slideIndex] === variantIndex ? ' is-selected' : '';

    return `
      <button
        class="variant-thumb${selected}"
        type="button"
        data-slide-index="${slideIndex}"
        data-variant-index="${variantIndex}"
        data-preview-path="${variant.path}"
        data-preview-title="${slideData[slideIndex].title} — ${variant.label}"
        title="${slideData[slideIndex].title} — ${variant.label}"
      >
        <img src="${variant.path}" alt="${slideData[slideIndex].title} ${variant.label}">
      </button>
    `;
  }

  function buildSidebar() {
    slideCards.innerHTML = slideData.map((slide, slideIndex) => `
      <section class="slide-card">
        <div class="slide-header">
          <div class="slide-main-thumb">
            <img id="mainThumb-${slideIndex}" src="${currentVariant(slideIndex).path}" alt="${slide.description}">
          </div>
          <div>
            <h3>${slideIndex + 1}</h3>
            <div class="slide-copy">${slide.lines.join(' ')}</div>
          </div>
        </div>
        <div class="variants-row">
          ${slide.variants.map((_, variantIndex) => thumbButton(slideIndex, variantIndex)).join('')}
        </div>
      </section>
    `).join('');
  }

  function syncVariantUI(slideIndex) {
    const imagePath = currentVariant(slideIndex).path;
    const mainThumb = document.getElementById('mainThumb-' + slideIndex);
    const previewImages = slidesRoot.querySelectorAll('[data-slide-index="' + slideIndex + '"] img');

    if (mainThumb) mainThumb.src = imagePath;
    previewImages.forEach((image) => {
      image.src = imagePath;
    });

    document.querySelectorAll('[data-slide-index="' + slideIndex + '"]').forEach((node) => {
      const variantIndex = Number(node.dataset.variantIndex);
      node.classList.toggle('is-selected', variantIndex === state.selectedVariant[slideIndex]);
    });
  }

  function updateStatus() {
    slideStatus.textContent = (state.currentSlide + 1) + ' / ' + slideData.length;
    modeStatus.textContent = state.autoplay ? 'auto' : 'manual';
    textStatus.textContent = state.animateText ? 'text on' : 'text off';
    audioStatus.textContent = state.muted ? 'audio off' : 'audio on';

    muteToggle.setAttribute('aria-checked', String(state.muted));
    autoplayToggle.setAttribute('aria-checked', String(state.autoplay));
    textAnimationToggle.setAttribute('aria-checked', String(state.animateText));

    screen.classList.toggle('animate-text', state.animateText);
    screen.classList.toggle('manual-nav', !state.autoplay);
  }

  function preloadImages() {
    slideData.forEach((slide) => {
      slide.variants.forEach((variant) => {
        const img = new Image();
        img.src = variant.path;
      });
    });
  }

  function syncAudio(tryPlay) {
    bgMusic.muted = state.muted;
    if (state.muted) {
      bgMusic.pause();
      return;
    }
    if (tryPlay) {
      bgMusic.play().catch(() => {});
    }
  }

  function resetTextAnimation(slideNode) {
    if (!slideNode || !state.animateText) return;
    const lines = slideNode.querySelectorAll('.caption-line');
    lines.forEach((line) => {
      line.style.transition = 'none';
      line.style.opacity = '0';
      line.style.transform = 'translateY(18px)';
    });
    slideNode.offsetHeight;
    lines.forEach((line) => {
      line.style.transition = '';
      line.style.opacity = '';
      line.style.transform = '';
    });
  }

  function showSlide(index) {
    const total = slideData.length;
    const nextIndex = (index + total) % total;
    const current = slidesRoot.querySelector('.slide.is-active');
    const next = slidesRoot.querySelector('[data-slide-index="' + nextIndex + '"]');

    if (current) current.classList.remove('is-active');
    if (next) {
      next.classList.add('is-active');
      resetTextAnimation(next);
    }

    state.currentSlide = nextIndex;
    updateStatus();
  }

  function nextSlide() {
    const nextIndex = state.currentSlide + 1;
    if (nextIndex >= slideData.length && !state.muted) {
      bgMusic.currentTime = 0;
      bgMusic.play().catch(() => {});
    }
    showSlide(nextIndex);
  }

  function prevSlide() {
    showSlide(state.currentSlide - 1);
  }

  function stopAutoplay() {
    if (autoplayTimer) {
      clearInterval(autoplayTimer);
      autoplayTimer = null;
    }
  }

  function startAutoplay() {
    stopAutoplay();
    if (!state.autoplay) return;
    autoplayTimer = setInterval(nextSlide, 10000);
  }

  function restartPreview() {
    showSlide(0);
    bgMusic.currentTime = 0;
    syncAudio(true);
    startAutoplay();
  }

  function setVariant(slideIndex, variantIndex) {
    state.selectedVariant[slideIndex] = variantIndex;
    syncVariantUI(slideIndex);
  }

  function positionHoverPreview(event) {
    const offset = 18;
    const previewWidth = 220;
    const previewHeight = 420;
    let left = event.clientX + offset;
    let top = event.clientY + offset;

    if (left + previewWidth > window.innerWidth - 12) {
      left = event.clientX - previewWidth - offset;
    }
    if (top + previewHeight > window.innerHeight - 12) {
      top = window.innerHeight - previewHeight - 12;
    }
    if (top < 12) {
      top = 12;
    }

    hoverPreview.style.transform = 'translate3d(' + left + 'px, ' + top + 'px, 0)';
  }

  function showHoverPreview(button, event) {
    const path = button.dataset.previewPath;
    const title = button.dataset.previewTitle;
    if (!path) return;
    hoverPreviewImage.src = path;
    hoverPreviewImage.alt = title || '';
    hoverPreviewTitle.textContent = title || '';
    hoverPreview.classList.add('is-visible');
    positionHoverPreview(event);
  }

  function hideHoverPreview() {
    hoverPreview.classList.remove('is-visible');
  }

  function bindVariantClicks(root) {
    root.addEventListener('click', (event) => {
      const button = event.target.closest('[data-slide-index][data-variant-index]');
      if (!button) return;
      setVariant(Number(button.dataset.slideIndex), Number(button.dataset.variantIndex));
      syncAudio(true);
    });
  }

  function bindHoverPreview(root) {
    root.addEventListener('mouseover', (event) => {
      const button = event.target.closest('[data-preview-path]');
      if (!button) return;
      showHoverPreview(button, event);
    });

    root.addEventListener('mousemove', (event) => {
      const button = event.target.closest('[data-preview-path]');
      if (!button) return;
      positionHoverPreview(event);
    });

    root.addEventListener('mouseout', (event) => {
      const button = event.target.closest('[data-preview-path]');
      if (!button) return;
      const related = event.relatedTarget;
      if (related && button.contains(related)) return;
      hideHoverPreview();
    });
  }

  function bindEvents() {
    bindVariantClicks(slideCards);
    bindHoverPreview(slideCards);

    muteToggle.addEventListener('click', () => {
      state.muted = !state.muted;
      updateStatus();
      syncAudio(!state.muted);
    });

    autoplayToggle.addEventListener('click', () => {
      state.autoplay = !state.autoplay;
      updateStatus();
      startAutoplay();
      syncAudio(true);
    });

    textAnimationToggle.addEventListener('click', () => {
      state.animateText = !state.animateText;
      updateStatus();
      const active = slidesRoot.querySelector('.slide.is-active');
      resetTextAnimation(active);
    });

    document.getElementById('restartBtn').addEventListener('click', restartPreview);
    document.getElementById('nextBtn').addEventListener('click', () => {
      nextSlide();
      syncAudio(true);
    });
    document.getElementById('prevBtn').addEventListener('click', () => {
      prevSlide();
      syncAudio(true);
    });

    document.addEventListener('keydown', (event) => {
      if (state.autoplay) return;
      if (event.key === 'ArrowRight') nextSlide();
      if (event.key === 'ArrowLeft') prevSlide();
    });

    ['pointerdown', 'keydown'].forEach((eventName) => {
      window.addEventListener(eventName, () => syncAudio(true), { passive: true });
    });
  }

  buildPreviewSlides();
  buildSidebar();
  preloadImages();
  bindEvents();
  updateStatus();
  showSlide(0);
  startAutoplay();
})();
</script>
</body>
</html>
